<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Player · Viana Clips</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0E2A5E;
      --navy-deep: #07153A;
      --gold: #E8B842;
      --paper: #F7F4ED;
      --ink: #0B132B;
      --muted: #5B6478;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Archivo', system-ui, sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .topbar { background: var(--navy); color: var(--paper); border-bottom: 4px solid var(--gold); }
    .topbar-inner {
      max-width: 1440px; margin: 0 auto; padding: 18px 32px;
      display: flex; align-items: center; gap: 20px;
    }
    .brand { display: flex; align-items: center; gap: 14px; text-decoration: none; color: inherit; }
    .brand-logo { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: white; border: 2px solid var(--gold); }
    .brand-name { font-family: 'Archivo Black', sans-serif; font-size: 20px; letter-spacing: 0.02em; }
    .brand-name .accent { color: var(--gold); }
    .topbar-spacer { flex: 1; }
    .back-link {
      display: inline-flex; align-items: center; gap: 8px;
      color: rgba(247,244,237,0.85);
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
      padding: 8px 14px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      transition: all 0.15s;
    }
    .back-link:hover { background: rgba(255,255,255,0.06); color: var(--gold); border-color: var(--gold); }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 40px 32px 80px;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 40px;
      align-items: start;
    }
    @media (max-width: 1000px) { main { grid-template-columns: 1fr; } }

    .player-section {}

    .breadcrumb {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .breadcrumb a { color: var(--muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--navy); }
    .breadcrumb .gold { color: var(--gold); }

    h1.video-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(34px, 4.5vw, 56px);
      line-height: 0.95;
      margin: 0 0 16px;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }

    .expire-banner {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.4;
      background: rgba(232,184,66,0.14);
      border: 1px solid rgba(232,184,66,0.4);
      color: #6B4D0C;
    }
    .expire-banner svg { width: 22px; height: 22px; flex-shrink: 0; color: var(--gold); }
    .expire-banner.urgent {
      background: rgba(255,59,48,0.1);
      border-color: rgba(255,59,48,0.35);
      color: #9b1c14;
    }
    .expire-banner.urgent svg { color: #FF3B30; }
    .expire-banner strong { font-weight: 800; }
    .expire-banner .countdown {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.1em;
      padding: 6px 12px;
      background: rgba(255,255,255,0.6);
      border-radius: 6px;
    }

    .video-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: black;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(7,21,58,0.25);
    }
    .video-frame video {
      width: 100%; height: 100%; display: block; background: black;
    }
    .video-frame .placeholder-overlay {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      background:
        radial-gradient(ellipse 70% 55% at 50% 50%, rgba(232,184,66,0.12), transparent 60%),
        repeating-linear-gradient(90deg, #143e22 0 50px, #1a4f2c 50px 100px);
      pointer-events: none;
    }
    .video-frame .ph-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .btn {
      appearance: none; border: 0; cursor: pointer;
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 22px; border-radius: 10px;
      font-family: 'Archivo', sans-serif;
      font-size: 14px; font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      transition: transform 0.1s, background 0.15s, color 0.15s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.primary { background: var(--navy); color: var(--paper); }
    .btn.primary:hover { background: var(--navy-deep); }
    .btn.gold { background: var(--gold); color: var(--navy-deep); }
    .btn.gold:hover { background: #d6a431; }
    .btn.ghost { background: white; color: var(--ink); border: 1px solid rgba(11,19,43,0.14); }
    .btn.ghost:hover { border-color: var(--navy); color: var(--navy); }
    .btn svg { width: 16px; height: 16px; }
    .btn.whatsapp { background: #25D366; color: white; }
    .btn.whatsapp:hover { background: #1fb858; }

    .meta-grid {
      margin-top: 36px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      padding: 24px;
      background: white;
      border: 1px solid rgba(11,19,43,0.08);
      border-radius: 14px;
    }
    .meta-grid .item .lbl {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .meta-grid .item .val {
      font-family: 'Archivo Black', sans-serif;
      font-size: 18px;
      letter-spacing: -0.005em;
    }
    @media (max-width: 700px) { .meta-grid { grid-template-columns: repeat(2, 1fr); } }

    /* sidebar */
    aside {
      position: sticky;
      top: 24px;
    }
    .side-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .side-title .bar {
      width: 24px; height: 3px; background: var(--gold);
    }
    .side-list {
      display: flex; flex-direction: column; gap: 10px;
    }
    .side-clip {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 12px;
      text-decoration: none;
      color: inherit;
      padding: 8px;
      border-radius: 10px;
      transition: background 0.15s;
    }
    .side-clip:hover { background: rgba(11,19,43,0.04); }
    .side-thumb {
      aspect-ratio: 16/9;
      border-radius: 6px;
      position: relative;
      overflow: hidden;
      background: var(--navy);
    }
    .side-thumb-grass { background: repeating-linear-gradient(90deg, #1a5e35 0 24px, #1f6c3d 24px 48px); }
    .side-thumb-night { background: repeating-linear-gradient(90deg, #143e22 0 24px, #1a4f2c 24px 48px); }
    .side-dur {
      position: absolute; bottom: 4px; right: 4px;
      background: rgba(7,21,58,0.85); color: white;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; padding: 2px 4px; border-radius: 3px;
    }
    .side-info .t {
      font-family: 'Archivo Black', sans-serif;
      font-size: 13px;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: -0.005em;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .side-info .m {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .toast {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--navy-deep);
      color: var(--paper);
      padding: 12px 20px;
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      box-shadow: 0 12px 32px rgba(7,21,58,0.3);
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s;
      z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast .gold { color: var(--gold); }
  </style>
</head>
<body data-screen-label="02 Player">

  <header class="topbar">
    <div class="topbar-inner">
      <a href="index.html" class="brand">
        <img src="assets/logo.png" alt="Society Viana" class="brand-logo" />
        <div class="brand-name">VIANA<span class="accent">·</span>CLIPS</div>
      </a>
      <div class="topbar-spacer"></div>
      <a class="back-link" href="index.html">← Voltar aos clipes</a>
    </div>
  </header>

  <main>
    <section class="player-section">
      <div class="breadcrumb">
        <a href="index.html">Clipes</a>  <span class="gold">/</span>  <span id="bc-date">—</span>  <span class="gold">/</span>  <span id="bc-id">—</span>
      </div>

      <h1 class="video-title" id="title">Carregando…</h1>

      <div class="expire-banner" id="expire-banner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        <div><strong>Disponível por 24h</strong> — depois disso o vídeo é removido. Baixe ou compartilhe agora.</div>
        <div class="countdown" id="countdown">—</div>
      </div>

      <div class="scoreboard" style="display:none" id="scoreboard"></div>

      <div class="video-frame">
        <video id="video" controls poster="" preload="metadata">
          <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4" />
        </video>
        <div class="placeholder-overlay" id="ph-overlay">
          <div class="ph-text">▶ Toque para reproduzir o lance</div>
        </div>
      </div>

      <div class="actions">
        <a class="btn gold" id="download-btn" download>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 3v12m0 0l-5-5m5 5l5-5M4 21h16"/></svg>
          Baixar lance
        </a>
        <a class="btn whatsapp" id="whatsapp-btn" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.6 6.3A7.85 7.85 0 0012 4a7.93 7.93 0 00-6.7 12.05L4 21l5.05-1.3A7.92 7.92 0 0019.93 12a7.85 7.85 0 00-2.32-5.7zM12 18.5a6.55 6.55 0 01-3.34-.92l-.24-.14-2.9.76.78-2.84-.16-.25A6.59 6.59 0 1112 18.5zm3.59-4.93c-.2-.1-1.16-.57-1.34-.64s-.31-.1-.44.1-.5.64-.62.77-.23.15-.43.05a5.36 5.36 0 01-1.58-.97 5.92 5.92 0 01-1.1-1.36c-.11-.2 0-.3.09-.4l.3-.34.2-.34a.37.37 0 000-.35c0-.1-.44-1.06-.6-1.45s-.32-.33-.44-.34h-.38a.72.72 0 00-.52.24 2.21 2.21 0 00-.7 1.65 3.86 3.86 0 00.81 2.05A8.83 8.83 0 0012.62 16a4.36 4.36 0 002.13.6 1.85 1.85 0 001.21-.86 1.49 1.49 0 00.1-.85c-.05-.07-.18-.13-.38-.22z"/></svg>
          Compartilhar no Zap
        </a>
        <button class="btn ghost" id="copy-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 5h9a2 2 0 012 2v9M5 9h9a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2v-9a2 2 0 012-2z"/></svg>
          Copiar link
        </button>
      </div>

      <div class="meta-grid">
        <div class="item"><div class="lbl">Data</div><div class="val" id="meta-date">—</div></div>
        <div class="item"><div class="lbl">Horário</div><div class="val" id="meta-time">—</div></div>
        <div class="item"><div class="lbl">Duração</div><div class="val" id="meta-dur">—</div></div>
      </div>
    </section>

    <aside>
      <div class="side-title"><span class="bar"></span>Mais lances do jogo</div>
      <div class="side-list" id="side-list"></div>
    </aside>
  </main>

  <div class="toast" id="toast">Link copiado <span class="gold">✓</span></div>

  <script src="data.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const id = params.get("id") || (window.CLIPS[0] && window.CLIPS[0].id);
      const clip = window.CLIPS.find((c) => c.id === id) || window.CLIPS[0];
      if (!clip) return;

      document.title = `${clip.title} · Viana Clips`;
      document.getElementById("title").textContent = clip.title;
      document.getElementById("bc-id").textContent = clip.id.toUpperCase();
      document.getElementById("bc-date").textContent = window.formatDate(clip.date);
      document.getElementById("meta-date").textContent = window.formatDate(clip.date);
      document.getElementById("meta-time").textContent = clip.time;
      document.getElementById("meta-dur").textContent = clip.duration;

      // Expiration banner
      const rem = window.timeRemaining(clip.expiresAt);
      const banner = document.getElementById("expire-banner");
      const countdown = document.getElementById("countdown");
      countdown.textContent = rem.text.toUpperCase().replace("EXPIRA EM ", "");
      if (rem.urgency >= 0.92) banner.classList.add("urgent");
      if (rem.minutes <= 0) {
        banner.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><div><strong>Clipe expirado</strong> — este lance não está mais disponível.</div>';
        banner.classList.add("urgent");
      }

      // Actions
      const url = location.href;
      const dlBtn = document.getElementById("download-btn");
      dlBtn.href = "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4";
      dlBtn.download = `${clip.id}-viana-clips.mp4`;

      const wa = document.getElementById("whatsapp-btn");
      const text = `Olha esse lance no Viana Clips: ${clip.title} — ${url}`;
      wa.href = `https://wa.me/?text=${encodeURIComponent(text)}`;

      const toast = document.getElementById("toast");
      function showToast(msg) {
        if (msg) toast.firstChild.textContent = msg + " ";
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 1800);
      }
      document.getElementById("copy-btn").addEventListener("click", async () => {
        try { await navigator.clipboard.writeText(url); showToast("Link copiado"); }
        catch { showToast("Falha ao copiar"); }
      });

      // hide placeholder overlay when video plays
      const video = document.getElementById("video");
      const ph = document.getElementById("ph-overlay");
      video.addEventListener("play", () => ph.style.display = "none");

      // sidebar related (same teams or recent)
      const related = window.CLIPS
        .filter((c) => c.id !== clip.id && c.date === clip.date)
        .slice(0, 6);
      const fallback = window.CLIPS.filter((c) => c.id !== clip.id).slice(0, 6);
      const list = (related.length ? related : fallback).slice(0, 6);
      const sideList = document.getElementById("side-list");
      list.forEach((c) => {
        const a = document.createElement("a");
        a.href = `player.html?id=${encodeURIComponent(c.id)}`;
        a.className = "side-clip";
        const thumbCls = c.thumb.includes("night") ? "side-thumb-night" : "side-thumb-grass";
        a.innerHTML = `
          <div class="side-thumb ${thumbCls}">
            <div class="side-dur">${c.duration}</div>
          </div>
          <div class="side-info">
            <div class="t">${c.title}</div>
            <div class="m">${window.relativeTime(c.createdAt)} · ${c.duration}</div>
          </div>
        `;
        sideList.appendChild(a);
      });
    })();
  </script>
</body>
</html>
